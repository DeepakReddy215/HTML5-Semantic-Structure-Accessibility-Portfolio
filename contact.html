<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact form for KOTHA DEEPAK REDDY.">
  <title>Contact | KOTHA DEEPAK REDDY</title>
</head>
<body>
  <header role="banner">
    <nav role="navigation" aria-label="Main menu">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="contact.html" aria-current="page">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main id="mnC" role="main">
    <section aria-labelledby="cnt">
      <h1 id="cnt">Get In Touch</h1>
      
      <form action="#" method="POST" aria-label="Contact Form">
        <div>
          <label for="nmF">Full Name</label>
          <input type="text" id="nmF" name="nmF" required aria-required="true" autocomplete="name">
        </div>
        
        <div>
          <label for="eml">Email Address</label>
          <input type="email" id="eml" name="eml" required aria-required="true" autocomplete="email">
        </div>
        
        <div>
          <label for="msg">Message</label>
          <textarea id="msg" name="msg" rows="5" required aria-required="true"></textarea>
        </div>
        
        <button type="submit">Send Message</button>
      </form>
    </section>
  </main>

  <footer role="contentinfo">
    <p>&copy; 2026 KOTHA DEEPAK REDDY</p>
  </footer>
</body>
</html>
